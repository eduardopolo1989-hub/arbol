<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol Genealógico Inteligente Interconectado</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --spouse-color: #e02424;
            --line-color: #94a3b8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --action-color: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--primary-color);
        }

        .container {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .form-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .form-section h2 {
            margin-top: 0;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 8px;
        }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input { width: auto; }
        .hidden { display: none; }

        button { width: 100%; padding: 10px; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit { background-color: var(--secondary-color); }
        .btn-submit:hover { background-color: #2980b9; }
        .btn-cancel { background-color: #94a3b8; }

        /* Lienzo del Árbol */
        .tree-viewport {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow-x: auto;
            min-height: 80vh;
            display: flex;
            justify-content: center;
        }

        /* Estructura Jerárquica Limpia */
        .tree, .tree ul, .tree li { list-style-type: none; margin: 0; padding: 0; position: relative; }
        .tree { display: flex; justify-content: center; align-items: flex-start; }
        .tree ul { display: flex; justify-content: center; position: relative; padding-top: 30px; }
        .tree li { text-align: center; position: relative; padding: 30px 10px 0 10px; }

        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid var(--line-color); width: 50%; height: 30px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--line-color); }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid var(--line-color); border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid var(--line-color); width: 0; height: 30px; }

        .node-group { display: inline-flex; align-items: flex-start; gap: 35px; position: relative; }

        /* Tarjetas */
        .member-card {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            width: 150px;
            padding: 10px;
            display: inline-block;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .member-photo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin: 0 auto 6px; display: block; border: 2px solid var(--secondary-color); }
        .member-name { font-weight: bold; font-size: 0.8rem; margin-bottom: 2px; }
        .member-dates { font-size: 0.65rem; color: #64748b; margin-bottom: 6px; }
        .member-role { font-size: 0.65rem; font-weight: bold; color: var(--action-color); margin-bottom: 4px; text-transform: uppercase; }
        
        .card-actions { display: flex; gap: 4px; justify-content: center; }
        .btn-card { padding: 3px 5px; font-size: 0.6rem; border-radius: 4px; width: auto; font-weight: normal; }
        .btn-card-edit { background-color: #cbd5e1; color: #334155; }
        .btn-card-link { background-color: var(--action-color); color: white; }

        /* Conector Horizontal de Parejas */
        .spouse-connection { 
            position: absolute; 
            top: 40px; 
            left: 162px; 
            width: 35px; 
            border-top: 2px dashed var(--spouse-color); 
            z-index: 1; 
        }
        .spouse-label {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            background: #ffebee;
            color: var(--spouse-color);
            padding: 1px 3px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="form-section" id="formWrapper">
            <div id="crudBlock">
                <h2 id="formTitle">Registrar Familiar</h2>
                <form id="treeForm">
                    <input type="hidden" id="editingMemberId" value="">
                    <div class="form-group">
                        <label for="names">Nombres:</label>
                        <input type="text" id="names" required placeholder="Ej. Carlos Eduardo">
                    </div>
                    <div class="form-group">
                        <label for="lastNames">Apellidos:</label>
                        <input type="text" id="lastNames" required placeholder="Ej. Polo Velasco">
                    </div>
                    <div class="form-group">
                        <label for="birthYear">Año de Nacimiento:</label>
                        <input type="number" id="birthYear" min="1700" max="2026" required placeholder="Ej. 1989">
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="isAlive" checked onchange="toggleDeathField()">
                        <label for="isAlive">¿Está con vida?</label>
                    </div>
                    <div class="form-group hidden" id="deathGroup">
                        <label for="deathYear">Año de Fallecimiento:</label>
                        <input type="number" id="deathYear" min="1700" max="2026" placeholder="Ej. 2024">
                    </div>
                    <div class="form-group">
                        <label for="photo">Foto:</label>
                        <input type="file" id="photo" accept="image/*">
                    </div>
                    <button type="submit" class="btn-submit" id="btnSubmit">Guardar Familiar</button>
                    <button type="button" class="btn-cancel hidden" id="btnCancel" onclick="resetForm()" style="margin-top: 8px;">Cancelar</button>
                </form>
            </div>

            <div id="linkBlock" class="hidden" style="margin-top: 20px; padding-top: 15px; border-top: 2px solid var(--action-color);">
                <h2 style="color: var(--action-color); border-bottom-color: var(--action-color);">Interconectar Relación</h2>
                <p style="font-size: 0.8rem; color: #64748b;">Establecer un lazo para: <strong id="linkingMemberName"></strong></p>
                
                <div class="form-group">
                    <label for="targetRelativeSelect">Familiar Destino:</label>
                    <select id="targetRelativeSelect"></select>
                </div>
                <div class="form-group">
                    <label for="advancedRelationshipType">¿Qué rol cumple el Destino respecto al Seleccionado?</label>
                    <select id="advancedRelationshipType">
                        <option value="es_padre">Es su PADRE (Línea de arriba)</option>
                        <option value="es_madre">Es su MADRE (Línea de arriba)</option>
                        <option value="es_esposo">Es su ESPOSO/A (Conexión al lado)</option>
                        <option value="es_hijo">Es su HIJO/A (Línea de abajo)</option>
                    </select>
                </div>
                <button type="button" onclick="executeAdvancedLink()" style="background-color: var(--action-color);">Establecer Vínculo</button>
                <button type="button" class="btn-cancel" onclick="closeLinkBlock()" style="margin-top: 8px;">Cancelar</button>
            </div>
        </section>

        <main class="tree-viewport">
            <div class="tree" id="treeContainer">
                <p id="emptyMessage" style="color: #64748b; padding-top: 40px;">No has agregado ningún miembro aún.</p>
            </div>
        </main>
    </div>

    <script>
        let familyData = [];
        let activeLinkSourceId = null;

        function toggleDeathField() {
            const isAlive = document.getElementById('isAlive').checked;
            document.getElementById('deathGroup').classList.toggle('hidden', isAlive);
        }

        function openLinkMode(id) {
            const member = familyData.find(m => m.id === id);
            if (!member) return;
            
            activeLinkSourceId = id;
            document.getElementById('linkBlock').classList.remove('hidden');
            document.getElementById('linkingMemberName').textContent = member.name;
            
            const select = document.getElementById('targetRelativeSelect');
            select.innerHTML = '';
            familyData.forEach(m => {
                if (m.id === id) return;
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.name;
                select.appendChild(opt);
            });
        }

        function closeLinkBlock() {
            document.getElementById('linkBlock').classList.add('hidden');
            activeLinkSourceId = null;
        }

        function executeAdvancedLink() {
            if (!activeLinkSourceId) return;
            
            const targetId = document.getElementById('targetRelativeSelect').value;
            const role = document.getElementById('advancedRelationshipType').value;
            
            const source = familyData.find(m => m.id === activeLinkSourceId);
            const target = familyData.find(m => m.id === targetId);

            if (!source || !target) return;

            if (role === 'es_padre') {
                source.fatherId = target.id;
            } else if (role === 'es_madre') {
                source.motherId = target.id;
            } else if (role === 'es_hijo') {
                // Al decir que 'target' es hijo de 'source', mapeamos el parentesco correcto
                target.fatherId = source.id; 
            } else if (role === 'es_esposo') {
                source.spouseId = target.id;
                target.spouseId = source.id;
            }

            renderTreeGraph();
            closeLinkBlock();
        }

        function editMember(id) {
            const member = familyData.find(m => m.id === id);
            if (!member) return;

            document.getElementById('formTitle').textContent = "Editar Familiar";
            document.getElementById('btnSubmit').textContent = "Guardar Cambios";
            document.getElementById('btnCancel').classList.remove('hidden');

            document.getElementById('editingMemberId').value = member.id;
            document.getElementById('names').value = member.name.split(' ')[0] || '';
            document.getElementById('lastNames').value = member.name.split(' ').slice(1).join(' ') || '';
            document.getElementById('birthYear').value = member.birth;
            document.getElementById('isAlive').checked = member.isAlive;
            toggleDeathField();
            if (!member.isAlive) document.getElementById('deathYear').value = member.death;
        }

        function resetForm() {
            document.getElementById('formTitle').textContent = "Registrar Familiar";
            document.getElementById('btnSubmit').textContent = "Guardar Familiar";
            document.getElementById('btnCancel').classList.add('hidden');
            document.getElementById('editingMemberId').value = "";
            document.getElementById('treeForm').reset();
            toggleDeathField();
        }

        document.getElementById('treeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editingId = document.getElementById('editingMemberId').value;
            const names = document.getElementById('names').value;
            const lastNames = document.getElementById('lastNames').value;
            const birthYear = document.getElementById('birthYear').value;
            const isAlive = document.getElementById('isAlive').checked;
            const deathYear = document.getElementById('deathYear').value;
            const photoInput = document.getElementById('photo');

            let member;
            if (editingId) {
                member = familyData.find(m => m.id === editingId);
                member.name = `${names} ${lastNames}`;
                member.birth = birthYear;
                member.isAlive = isAlive;
                member.death = isAlive ? null : deathYear;
            } else {
                member = {
                    id: 'mem_' + Date.now(),
                    name: `${names} ${lastNames}`,
                    birth: birthYear,
                    isAlive: isAlive,
                    death: isAlive ? null : deathYear,
                    fatherId: null,
                    motherId: null,
                    spouseId: null,
                    photo: 'https://cdn-icons-png.flaticon.com/512/847/847969.png'
                };
            }

            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    member.photo = event.target.result;
                    if (!editingId) familyData.push(member);
                    renderTreeGraph();
                    resetForm();
                };
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                if (!editingId) familyData.push(member);
                renderTreeGraph();
                resetForm();
            }
        });

        function getCardHTML(member, roleLabel = '') {
            const dateText = member.isAlive ? `nac. ${member.birth}` : `${member.birth} - ${member.death}`;
            const labelHTML = roleLabel ? `<div class="member-role">${roleLabel}</div>` : '';
            return `
                <div class="member-card">
                    ${labelHTML}
                    <img src="${member.photo}" class="member-photo">
                    <div class="member-name">${member.name}</div>
                    <div class="member-dates">${dateText}</div>
                    <div class="card-actions">
                        <button class="btn-card btn-card-edit" onclick="editMember('${member.id}')">✏️</button>
                        <button class="btn-card btn-card-link" onclick="openLinkMode('${member.id}')">🔗 Vincular</button>
                    </div>
                </div>
            `;
        }

        // Renderizador recursivo corregido para respetar líneas de sangre estrictas
        function buildTreeHTML(currentMemberId, renderedIds) {
            if (!currentMemberId) return '';

            // Conseguir los hijos que pertenecen únicamente a este miembro específico (o a su matrimonio directo)
            const member = familyData.find(m => m.id === currentMemberId);
            if (!member) return '';

            // Buscamos hijos donde este miembro sea Padre o Madre
            const children = familyData.filter(m => 
                (m.fatherId === member.id || m.motherId === member.id) && !renderedIds.has(m.id)
            );

            if (children.length === 0) return '';

            let html = '<ul>';
            children.forEach(child => {
                if (renderedIds.has(child.id)) return;
                renderedIds.add(child.id);

                html += '<li><div class="node-group">';
                html += getCardHTML(child, "Hijo/a");

                // Pintar cónyuge si existe al lado, pero SIN arrastrar sus padres biológicos a esta línea
                if (child.spouseId) {
                    const spouse = familyData.find(m => m.id === child.spouseId);
                    if (spouse && !renderedIds.has(spouse.id)) {
                        renderedIds.add(spouse.id);
                        html += `<div class="spouse-connection"><span class="spouse-label">Esposos</span></div>`;
                        html += getCardHTML(spouse, "Cónyuge");
                    }
                }

                html += '</div>';
                // El hijo se vuelve el nuevo nodo superior para sus propios descendientes
                html += buildTreeHTML(child.id, renderedIds);
                html += '</li>';
            });
            html += '</ul>';
            return html;
        }

        function renderTreeGraph() {
            const container = document.getElementById('treeContainer');
            if (familyData.length === 0) {
                container.innerHTML = '<p id="emptyMessage">No has agregado ningún miembro aún.</p>';
                return;
            }

            let renderedIds = new Set();
            
            // Los ancestros más altos del árbol (quienes no tienen padres registrados arriba) actúan como la raíz
            const rootNodes = familyData.filter(m => m.fatherId === null && m.motherId === null);

            let finalHTML = '';

            rootNodes.forEach(root => {
                if (renderedIds.has(root.id)) return;
                // Si es un cónyuge de una raíz ya renderizada, se omite para evitar duplicación
                if (root.spouseId && renderedIds.has(root.spouseId)) return;

                renderedIds.add(root.id);

                finalHTML += '<ul><li><div class="node-group">';
                finalHTML += getCardHTML(root, "Familiar");

                if (root.spouseId) {
                    const spouse = familyData.find(m => m.id === root.spouseId);
                    if (spouse && !renderedIds.has(spouse.id)) {
                        renderedIds.add(spouse.id);
                        finalHTML += `<div class="spouse-connection"><span class="spouse-label">Esposos</span></div>`;
                        finalHTML += getCardHTML(spouse, "Cónyuge");
                    }
                }

                finalHTML += '</div>';
                
                // Genera la descendencia de este nodo raíz de forma jerárquica limpia
                finalHTML += buildTreeHTML(root.id, renderedIds);
                
                finalHTML += '</li></ul>';
            });

            container.innerHTML = finalHTML || '<p id="emptyMessage">Error en la composición jerárquica.</p>';
        }
    </script>
</body>
</html>
