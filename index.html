<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol Genealógico Inteligente con Edición</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --spouse-color: #e02424;
            --line-color: #94a3b8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--primary-color);
        }

        .container {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .form-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .form-section h2 {
            margin-top: 0;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 8px;
            transition: color 0.3s;
        }

        .form-section.editing-mode h2 {
            color: var(--success-color);
            border-bottom-color: var(--success-color);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fff;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input { width: auto; }
        .hidden { display: none; }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit { background-color: var(--secondary-color); }
        .btn-submit:hover { background-color: #2980b9; }
        
        .btn-cancel { background-color: #94a3b8; }
        .btn-cancel:hover { background-color: #64748b; }

        .tree-viewport {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow-x: auto;
            min-height: 80vh;
            display: flex;
            justify-content: center;
        }

        .tree, .tree ul, .tree li {
            list-style-type: none;
            margin: 0;
            padding: 0;
            position: relative;
        }

        .tree { display: flex; justify-content: center; }
        .tree ul { display: flex; justify-content: center; position: relative; padding-top: 20px; }
        .tree li { text-align: center; position: relative; padding: 20px 10px 0 10px; }

        .tree li::before, .tree li::after {
            content: ''; position: absolute; top: 0; right: 50%;
            border-top: 2px solid var(--line-color); width: 50%; height: 20px;
        }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--line-color); }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid var(--line-color); border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid var(--line-color); width: 0; height: 20px; }

        .node-group { display: inline-flex; align-items: flex-start; gap: 10px; position: relative; }

        .member-card {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            width: 150px;
            padding: 10px;
            display: inline-block;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            z-index: 10;
            cursor: pointer;
            transition: all 0.2s;
        }

        .member-card:hover {
            border-color: var(--secondary-color);
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .member-card::after {
            content: '✏️ Editar';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: white;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .member-card:hover::after { opacity: 1; }

        .member-photo {
            width: 60px; height: 60px; border-radius: 50%; object-fit: cover;
            margin: 0 auto 6px; display: block; border: 2px solid var(--secondary-color); background: #f8fafc;
        }

        .member-name { font-weight: bold; font-size: 0.85rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .member-dates { font-size: 0.7rem; color: #64748b; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .dot-alive { background-color: #22c55e; }
        .dot-deceased { background-color: #ef4444; }

        .spouse-connection { position: absolute; top: 40px; left: 145px; width: 20px; border-top: 2px dashed var(--spouse-color); z-index: 1; }
    </style>
</head>
<body>

    <div class="container">
        <section class="form-section" id="formWrapper">
            <h2 id="formTitle">Registrar Familiar</h2>
            <form id="treeForm">
                <input type="hidden" id="editingMemberId" value="">

                <div class="form-group">
                    <label for="names">Nombres:</label>
                    <input type="text" id="names" required placeholder="Ej. Carlos Eduardo">
                </div>

                <div class="form-group">
                    <label for="lastNames">Apellidos:</label>
                    <input type="text" id="lastNames" required placeholder="Ej. Polo Velasco">
                </div>

                <div class="form-group">
                    <label for="birthYear">Año de Nacimiento:</label>
                    <input type="number" id="birthYear" min="1700" max="2026" required placeholder="Ej. 1989">
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="isAlive" checked onchange="toggleDeathField()">
                    <label for="isAlive">¿Está con vida?</label>
                </div>

                <div class="form-group hidden" id="deathGroup">
                    <label for="deathYear">Año de Fallecimiento:</label>
                    <input type="number" id="deathYear" min="1700" max="2026" placeholder="Ej. 2024">
                </div>

                <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 15px 0;">

                <div class="form-group">
                    <label for="relativeSelect">¿Tiene relación con algún miembro?</label>
                    <select id="relativeSelect" onchange="toggleRelationshipType()">
                        <option value="none">No, es miembro raíz (independiente)</option>
                    </select>
                </div>

                <div class="form-group hidden" id="relationshipGroup">
                    <label for="relationshipType">¿Qué es de esa persona?</label>
                    <select id="relationshipType">
                        <option value="padre">Es su Padre / Madre</option>
                        <option value="hijo">Es su Hijo / Hija</option>
                        <option value="hermano">Es su Hermano / Hermana</option>
                        <option value="esposo">Es su Esposo / Esposa</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="photo">Foto:</label>
                    <input type="file" id="photo" accept="image/*">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-submit" id="btnSubmit">Vincular al Árbol</button>
                    <button type="button" class="btn-cancel hidden" id="btnCancel" onclick="resetFormToCreation()">Cancelar Edición</button>
                </div>
            </form>
        </section>

        <main class="tree-viewport">
            <div class="tree" id="treeContainer">
                <p id="emptyMessage" style="color: #64748b; padding-top: 40px;">No has agregado ningún miembro aún. Comienza creando al primer miembro de la familia.</p>
            </div>
        </main>
    </div>

    <script>
        let familyData = [];

        function toggleDeathField() {
            const isAlive = document.getElementById('isAlive').checked;
            document.getElementById('deathGroup').classList.toggle('hidden', isAlive);
        }

        function toggleRelationshipType() {
            const relativeSelect = document.getElementById('relativeSelect').value;
            document.getElementById('relationshipGroup').classList.toggle('hidden', relativeSelect === 'none');
        }

        function editMember(id) {
            const member = familyData.find(m => m.id === id);
            if (!member) return;

            document.getElementById('formWrapper').classList.add('editing-mode');
            document.getElementById('formTitle').textContent = "Editar Familiar";
            document.getElementById('btnSubmit').textContent = "Guardar Cambios";
            document.getElementById('btnSubmit').style.backgroundColor = "var(--success-color)";
            document.getElementById('btnCancel').classList.remove('hidden');

            document.getElementById('editingMemberId').value = member.id;
            document.getElementById('names').value = member.name.split(' ')[0] || '';
            document.getElementById('lastNames').value = member.name.split(' ').slice(1).join(' ') || '';
            document.getElementById('birthYear').value = member.birth;
            document.getElementById('isAlive').checked = member.isAlive;
            toggleDeathField();
            if (!member.isAlive) {
                document.getElementById('deathYear').value = member.death;
            }

            updateRelativeSelectors(member.id);

            if (member.parentId) {
                document.getElementById('relativeSelect').value = member.parentId;
                document.getElementById('relationshipType').value = 'hijo';
            } else if (member.spouseId) {
                document.getElementById('relativeSelect').value = member.spouseId;
                document.getElementById('relationshipType').value = 'esposo';
            } else {
                const child = familyData.find(m => m.parentId === member.id);
                if (child) {
                    document.getElementById('relativeSelect').value = child.id;
                    document.getElementById('relationshipType').value = 'padre';
                } else {
                    document.getElementById('relativeSelect').value = 'none';
                }
            }
            toggleRelationshipType();
        }

        function resetFormToCreation() {
            document.getElementById('formWrapper').classList.remove('editing-mode');
            document.getElementById('formTitle').textContent = "Registrar Familiar";
            document.getElementById('btnSubmit').textContent = "Vincular al Árbol";
            document.getElementById('btnSubmit').style.backgroundColor = "var(--secondary-color)";
            document.getElementById('btnCancel').classList.add('hidden');
            document.getElementById('editingMemberId').value = "";
            
            document.getElementById('treeForm').reset();
            toggleDeathField();
            updateRelativeSelectors();
            toggleRelationshipType();
        }

        document.getElementById('treeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const editingId = document.getElementById('editingMemberId').value;
            const names = document.getElementById('names').value;
            const lastNames = document.getElementById('lastNames').value;
            const birthYear = document.getElementById('birthYear').value;
            const isAlive = document.getElementById('isAlive').checked;
            const deathYear = document.getElementById('deathYear').value;
            const relativeId = document.getElementById('relativeSelect').value;
            const relationshipType = document.getElementById('relationshipType').value;
            const photoInput = document.getElementById('photo');

            let currentMember;

            if (editingId) {
                currentMember = familyData.find(m => m.id === editingId);
                if (currentMember.spouseId) {
                    const oldSpouse = familyData.find(m => m.id === currentMember.spouseId);
                    if (oldSpouse) oldSpouse.spouseId = null;
                }
                currentMember.name = `${names} ${lastNames}`;
                currentMember.birth = birthYear;
                currentMember.isAlive = isAlive;
                currentMember.death = isAlive ? null : deathYear;
                currentMember.parentId = null;
                currentMember.spouseId = null;
            } else {
                currentMember = {
                    id: 'mem_' + Date.now(),
                    name: `${names} ${lastNames}`,
                    birth: birthYear,
                    isAlive: isAlive,
                    death: isAlive ? null : deathYear,
                    parentId: null,
                    spouseId: null,
                    photo: 'https://cdn-icons-png.flaticon.com/512/847/847969.png'
                };
            }

            if (relativeId !== 'none') {
                const relative = familyData.find(m => m.id === relativeId);
                
                if (relationshipType === 'padre') {
                    relative.parentId = currentMember.id;
                } else if (relationshipType === 'hijo') {
                    currentMember.parentId = relative.id;
                } else if (relationshipType === 'hermano') {
                    currentMember.parentId = relative.parentId;
                } else if (relationshipType === 'esposo') {
                    currentMember.spouseId = relative.id;
                    relative.spouseId = currentMember.id;
                    // Comparten el mismo padre de manera visual si es necesario, 
                    // pero para evitar bucles se mantiene parentId de forma independiente
                    currentMember.parentId = relative.parentId; 
                }
            }

            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentMember.photo = event.target.result;
                    finalizeSubmit(editingId, currentMember);
                };
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                finalizeSubmit(editingId, currentMember);
            }
        });

        function finalizeSubmit(isEditing, member) {
            if (!isEditing) {
                familyData.push(member);
            }
            renderTreeGraph();
            resetFormToCreation();
        }

        function updateRelativeSelectors(excludeId = null) {
            const relativeSelect = document.getElementById('relativeSelect');
            relativeSelect.innerHTML = '<option value="none">No, es miembro raíz (independiente)</option>';
            
            familyData.forEach(m => {
                if (excludeId && m.id === excludeId) return;
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.name;
                relativeSelect.appendChild(option);
            });
        }

        function getCardHTML(member) {
            const dateText = member.isAlive ? `b. ${member.birth}` : `${member.birth} - ${member.death}`;
            const dotClass = member.isAlive ? 'dot-alive' : 'dot-deceased';
            return `
                <div class="member-card" onclick="editMember('${member.id}')" title="Haz clic para editar">
                    <img src="${member.photo}" class="member-photo">
                    <div class="member-name">${member.name}</div>
                    <div class="member-dates">
                        <span class="status-dot ${dotClass}"></span>${dateText}
                    </div>
                </div>
            `;
        }

        // --- FUNCIÓN RECURSIVA CORREGIDA ---
        function buildTreeHTML(parentId, renderedIds) {
            // Buscamos los hijos directos del nodo padre actual
            const children = familyData.filter(m => m.parentId === parentId && !renderedIds.has(m.id));
            
            // Si el padre tiene una pareja, también recolectamos los hijos asignados a esa pareja
            const parentNode = familyData.find(m => m.id === parentId);
            if (parentNode && parentNode.spouseId) {
                const spouseChildren = familyData.filter(m => m.parentId === parentNode.spouseId && !renderedIds.has(m.id));
                spouseChildren.forEach(c => {
                    if(!children.some(existing => existing.id === c.id)) {
                        children.push(c);
                    }
                });
            }

            if (children.length === 0) return '';

            let html = '<ul>';
            children.forEach(child => {
                if (renderedIds.has(child.id)) return;
                renderedIds.add(child.id);

                html += '<li><div class="node-group">';
                html += getCardHTML(child);

                // Vinculación de pareja horizontal estable
                if (child.spouseId) {
                    const spouse = familyData.find(m => m.id === child.spouseId);
                    if (spouse && !renderedIds.has(spouse.id)) {
                        renderedIds.add(spouse.id);
                        html += `<div class="spouse-connection"></div>`;
                        html += getCardHTML(spouse);
                    }
                }
                
                html += '</div>';
                // Llamada recursiva para traer los descendientes del hijo actual
                html += buildTreeHTML(child.id, renderedIds);
                html += '</li>';
            });
            html += '</ul>';
            return html;
        }

        function renderTreeGraph() {
            const container = document.getElementById('treeContainer');
            if (familyData.length === 0) {
                container.innerHTML = '<p id="emptyMessage">No has agregado ningún miembro aún.</p>';
                return;
            }

            let renderedIds = new Set();
            // Selección de raíces estables: Nodos sin padres que no sean la pareja secundaria ya procesada
            const rootNodes = familyData.filter(m => m.parentId === null);

            let finalHTML = '';
            rootNodes.forEach(root => {
                if (renderedIds.has(root.id)) return;
                renderedIds.add(root.id);

                finalHTML += '<ul><li><div class="node-group">';
                finalHTML += getCardHTML(root);

                if (root.spouseId) {
                    const spouse = familyData.find(m => m.id === root.spouseId);
                    if (spouse && !renderedIds.has(spouse.id)) {
                        renderedIds.add(spouse.id);
                        finalHTML += `<div class="spouse-connection"></div>`;
                        finalHTML += getCardHTML(spouse);
                    }
                }

                finalHTML += '</div>';
                finalHTML += buildTreeHTML(root.id, renderedIds);
                if (root.spouseId) {
                    finalHTML += buildTreeHTML(root.spouseId, renderedIds);
                }
                finalHTML += '</li></ul>';
            });

            container.innerHTML = finalHTML || '<p id="emptyMessage">Error al procesar las relaciones del árbol.</p>';
        }
    </script>
</body>
</html>
