<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol Genealógico Avanzado - Sistema Completo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --spouse-color: #e02424;
            --line-color: #94a3b8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --action-color: #8e44ad;
            --edit-color: #e67e22;
            --export-color: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            color: var(--primary-color);
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 15px;
            height: 96vh;
        }

        .form-section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .form-section h2 {
            margin-top: 0;
            font-size: 1.15rem;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 6px;
            transition: color 0.3s, border-color 0.3s;
        }

        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 3px; font-weight: 600; font-size: 0.8rem; }
        .form-group input, .form-group select { width: 100%; padding: 6px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 0.85rem; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input { width: auto; }
        .hidden { display: none; }

        button { width: 100%; padding: 8px; color: white; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 5px; }
        .btn-submit { background-color: var(--secondary-color); }
        .btn-submit:hover { background-color: #2980b9; }
        .btn-cancel { background-color: #94a3b8; }
        .btn-cancel:hover { background-color: #64748b; }

        .canvas-section {
            position: relative;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            overflow: auto;
            cursor: grab;
        }
        .canvas-section:active { cursor: grabbing; }

        #treeCanvas {
            background-color: #fafafa;
            display: block;
        }

        .instructions {
            font-size: 0.75rem;
            color: #64748b;
            background: #f8fafc;
            padding: 8px;
            border-radius: 6px;
            border-left: 3px solid var(--secondary-color);
            margin-bottom: 12px;
        }

        .theme-select-container {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 2px solid #16a085;
        }

        .export-container {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 2px solid var(--export-color);
        }
        
        .export-select {
            border: 2px solid var(--export-color) !important;
            font-weight: 600;
            color: #27ae60;
            background-color: #f4fbf7;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="form-section">
            <div class="instructions">
                Arrastra tarjetas para moverlas. <strong>Doble clic sobre una tarjeta</strong> para editarla.
            </div>

            <div id="crudBlock">
                <h2 id="formTitle">1. Registrar Familiar</h2>
                <form id="treeForm">
                    <input type="hidden" id="editingMemberId" value="">
                    <div class="form-group">
                        <label for="names">Nombres:</label>
                        <input type="text" id="names" required placeholder="Nombres">
                    </div>
                    <div class="form-group">
                        <label for="lastNames">Apellidos:</label>
                        <input type="text" id="lastNames" required placeholder="Apellidos">
                    </div>
                    <div class="form-group">
                        <label for="birthDate">Fecha de Nacimiento:</label>
                        <input type="date" id="birthDate" required>
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="isAlive" checked onchange="toggleDeathField()">
                        <label for="isAlive">¿Está con vida?</label>
                    </div>
                    <div class="form-group hidden" id="deathGroup">
                        <label for="deathDate">Fecha de Fallecimiento:</label>
                        <input type="date" id="deathDate">
                    </div>
                    <div class="form-group">
                        <label for="photo">Foto (Opcional):</label>
                        <input type="file" id="photo" accept="image/*">
                    </div>
                    <button type="submit" class="btn-submit" id="btnSubmit">Guardar Persona</button>
                    <button type="button" class="btn-cancel hidden" id="btnCancel" onclick="resetForm()">Cancelar Edición</button>
                </form>
            </div>

            <div id="linkBlock" style="margin-top: 15px; padding-top: 12px; border-top: 2px solid var(--action-color);">
                <h2 style="color: var(--action-color);">2. Conectar Parentescos</h2>
                <div class="form-group">
                    <label for="sourceSelect" style="color: var(--action-color);">Persona A:</label>
                    <select id="sourceSelect" onchange="updateLinkSelectors()"></select>
                </div>
                <div class="form-group">
                    <label for="advancedRelationshipType">Relación:</label>
                    <select id="advancedRelationshipType">
                        <option value="es_esposo">Es ESPOSO/A de</option>
                        <option value="es_hijo">Es PADRE/MADRE de</option>
                        <option value="es_padre">Es HIJO/A de</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="targetSelect">Persona B:</label>
                    <select id="targetSelect"></select>
                </div>
                <button type="button" onclick="executeAdvancedLink()" style="background-color: var(--action-color);">Establecer Vínculo</button>
            </div>

            <div class="theme-select-container">
                <h2 style="color: #16a085;">3. Estilo Visual del Árbol</h2>
                <div class="form-group">
                    <label for="themeSelector">Seleccionar Diseño:</label>
                    <select id="themeSelector" onchange="changeTreeTheme()">
                        <option value="clasico">Clásico (Corporativo / Limpio)</option>
                        <option value="elegante">Elegante (Premium / Apto Impresión)</option>
                        <option value="moderno">Moderno (Minimalista / Neón)</option>
                        <option value="estilizado">Estilizado (Vintage / Pastel)</option>
                        <option value="minimalista">Minimalista (Zen / Esencial)</option>
                    </select>
                </div>
            </div>

            <div class="export-container">
                <h2 style="color: var(--export-color);">4. Exportar Archivo</h2>
                <div class="form-group">
                    <label for="exportSelector">Selecciona una opción para guardar:</label>
                    <select id="exportSelector" class="export-select" onchange="handleExport(this)">
                        <option value="" selected disabled>— Seleccionar Formato —</option>
                        <option value="png">Exportar como PNG</option>
                        <option value="jpg">Exportar como JPG</option>
                        <option value="pdf">Exportar como PDF</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="canvas-section" id="canvasContainer">
            <canvas id="treeCanvas"></canvas>
        </section>
    </div>

    <script>
        let familyData = [];
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        
        const cardW = 180;
        const cardH = 70;
        const virtualWidth = 3000;
        const virtualHeight = 3000;

        const themes = {
            clasico: {
                bgCanvas: "#fafafa", cardBg: "#ffffff", cardBorderAlive: "#3498db", cardBorderDead: "#94a3b8",
                textColorName: "#2c3e50", textColorDate: "#64748b", fontName: "bold 11px sans-serif",
                fontDate: "10px sans-serif", lineColor: "#94a3b8", lineWidth: 2, lineDash: [],
                cardRadius: 8, shadowBlur: 4, shadowColor: "rgba(0,0,0,0.05)"
            },
            elegante: {
                bgCanvas: "#fdfbf7", cardBg: "#ffffff", cardBorderAlive: "#c5a059", cardBorderDead: "#a39070",
                textColorName: "#2c2416", textColorDate: "#6e6557", fontName: "italic bold 11.5px Georgia, serif",
                fontDate: "10px Georgia, serif", lineColor: "#c5a059", lineWidth: 1.5, lineDash: [],
                cardRadius: 4, shadowBlur: 2, shadowColor: "rgba(197, 160, 89, 0.1)"
            },
            moderno: {
                bgCanvas: "#0f172a", cardBg: "#1e293b", cardBorderAlive: "#00f5d4", cardBorderDead: "#475569",
                textColorName: "#ffffff", textColorDate: "#94a3b8", fontName: "bold 10px 'Courier New', monospace",
                fontDate: "9px 'Courier New', monospace", lineColor: "#00f5d4", lineWidth: 2, lineDash: [4, 4],
                cardRadius: 0, shadowBlur: 6, shadowColor: "rgba(0, 245, 212, 0.15)"
            },
            estilizado: {
                bgCanvas: "#f4f1ea", cardBg: "#fffdf9", cardBorderAlive: "#9b59b6", cardBorderDead: "#bdc3c7",
                textColorName: "#4a285d", textColorDate: "#7f8c8d", fontName: "bold 11px 'Trebuchet MS', sans-serif",
                fontDate: "10px 'Trebuchet MS', sans-serif", lineColor: "#9b59b6", lineWidth: 2.5, lineDash: [1, 2],
                cardRadius: 16, shadowBlur: 5, shadowColor: "rgba(155, 89, 181, 0.1)"
            },
            minimalista: {
                bgCanvas: "#ffffff", cardBg: "#f8fafc", cardBorderAlive: "#f8fafc", cardBorderDead: "#f1f5f9",
                textColorName: "#0f172a", textColorDate: "#475569", fontName: "500 11px system-ui, -apple-system, sans-serif",
                fontDate: "10px system-ui, -apple-system, sans-serif", lineColor: "#cbd5e1", lineWidth: 1, lineDash: [],
                cardRadius: 6, shadowBlur: 0, shadowColor: "transparent"
            }
        };

        let currentTheme = themes.clasico; 

        const ratio = window.devicePixelRatio || 1;
        canvas.width = virtualWidth * ratio;
        canvas.height = virtualHeight * ratio;
        canvas.style.width = virtualWidth + "px";
        canvas.style.height = virtualHeight + "px";
        ctx.scale(ratio, ratio);

        let selectedMember = null;
        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;

        function changeTreeTheme() {
            const selectedValue = document.getElementById('themeSelector').value;
            currentTheme = themes[selectedValue];
            canvas.style.backgroundColor = currentTheme.bgCanvas;
            drawTree();
        }

        function toggleDeathField() {
            const isAlive = document.getElementById('isAlive').checked;
            document.getElementById('deathGroup').classList.toggle('hidden', isAlive);
        }

        function updateLinkSelectors() {
            const sourceSelect = document.getElementById('sourceSelect');
            const targetSelect = document.getElementById('targetSelect');
            const activeId = sourceSelect.value;

            targetSelect.innerHTML = '';
            familyData.forEach(m => {
                if (m.id === activeId) return;
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.name;
                targetSelect.appendChild(opt);
            });
        }

        function refreshSelectors() {
            const sourceSelect = document.getElementById('sourceSelect');
            sourceSelect.innerHTML = '';
            familyData.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.name;
                sourceSelect.appendChild(opt);
            });
            updateLinkSelectors();
        }

        function executeAdvancedLink() {
            const sourceId = document.getElementById('sourceSelect').value;
            const targetId = document.getElementById('targetSelect').value;
            const role = document.getElementById('advancedRelationshipType').value;

            if (!sourceId || !targetId) return;

            const source = familyData.find(m => m.id === sourceId);
            const target = familyData.find(m => m.id === targetId);

            if (role === 'es_esposo') {
                source.spouseId = targetId;
                target.spouseId = sourceId;
            } else if (role === 'es_hijo') {
                if (!target.parents.includes(sourceId)) target.parents.push(sourceId);
            } else if (role === 'es_padre') {
                if (!source.parents.includes(targetId)) source.parents.push(targetId);
            }

            drawTree();
        }

        document.getElementById('treeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editingId = document.getElementById('editingMemberId').value;
            const names = document.getElementById('names').value;
            const lastNames = document.getElementById('lastNames').value;
            const birthDate = document.getElementById('birthDate').value;
            const isAlive = document.getElementById('isAlive').checked;
            const deathDate = document.getElementById('deathDate').value;
            const photoInput = document.getElementById('photo');

            if (editingId) {
                const member = familyData.find(m => m.id === editingId);
                if (member) {
                    member.name = `${names} ${lastNames}`;
                    member.birth = birthDate;
                    member.isAlive = isAlive;
                    member.death = isAlive ? null : deathDate;

                    if (photoInput.files && photoInput.files[0]) {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            const customImg = new Image();
                            customImg.src = event.target.result;
                            customImg.onload = function() {
                                member.imgObj = customImg;
                                finalizeRender();
                            };
                        };
                        reader.readAsDataURL(photoInput.files[0]);
                    } else {
                        finalizeRender();
                    }
                }
            } else {
                const spawnX = 300 + (familyData.length * 25) % 250;
                const spawnY = 150 + (familyData.length * 30) % 150;

                const newMember = {
                    id: 'mem_' + Date.now(),
                    name: `${names} ${lastNames}`,
                    birth: birthDate,
                    isAlive: isAlive,
                    death: isAlive ? null : deathDate,
                    parents: [],
                    spouseId: null,
                    x: spawnX,
                    y: spawnY,
                    imgObj: null 
                };

                if (photoInput.files && photoInput.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const customImg = new Image();
                        customImg.src = event.target.result;
                        customImg.onload = function() {
                            newMember.imgObj = customImg;
                            familyData.push(newMember);
                            finalizeRender();
                        };
                    };
                    reader.readAsDataURL(photoInput.files[0]);
                } else {
                    familyData.push(newMember);
                    finalizeRender();
                }
            }
        });

        function finalizeRender() {
            resetForm();
            refreshSelectors();
            drawTree();
        }

        function resetForm() {
            document.getElementById('treeForm').reset();
            document.getElementById('editingMemberId').value = "";
            document.getElementById('formTitle').textContent = "1. Registrar Familiar";
            document.getElementById('formTitle').style.color = "";
            document.getElementById('btnSubmit').textContent = "Guardar Persona";
            document.getElementById('btnSubmit').style.backgroundColor = "";
            document.getElementById('btnCancel').classList.add('hidden');
            toggleDeathField();
        }

        // CONTROL DRAG & DROP
        canvas.addEventListener('mousedown', function(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + document.getElementById('canvasContainer').scrollLeft;
            const mouseY = e.clientY - rect.top + document.getElementById('canvasContainer').scrollTop;

            for (let i = familyData.length - 1; i >= 0; i--) {
                const m = familyData[i];
                if (mouseX >= m.x && mouseX <= m.x + cardW && mouseY >= m.y && mouseY <= m.y + cardH) {
                    selectedMember = m;
                    isDragging = true;
                    offsetX = mouseX - m.x;
                    offsetY = mouseY - m.y;
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', function(e) {
            if (!isDragging || !selectedMember) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + document.getElementById('canvasContainer').scrollLeft;
            const mouseY = e.clientY - rect.top + document.getElementById('canvasContainer').scrollTop;

            selectedMember.x = mouseX - offsetX;
            selectedMember.y = mouseY - offsetY;
            drawTree();
        });

        window.addEventListener('mouseup', function() {
            isDragging = false;
            selectedMember = null;
        });

        canvas.addEventListener('dblclick', function(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + document.getElementById('canvasContainer').scrollLeft;
            const mouseY = e.clientY - rect.top + document.getElementById('canvasContainer').scrollTop;

            for (let i = familyData.length - 1; i >= 0; i--) {
                const m = familyData[i];
                if (mouseX >= m.x && mouseX <= m.x + cardW && mouseY >= m.y && mouseY <= m.y + cardH) {
                    const nameParts = m.name.split(" ");
                    const first = nameParts[0] || "";
                    const last = nameParts.slice(1).join(" ") || "";

                    document.getElementById('editingMemberId').value = m.id;
                    document.getElementById('names').value = first;
                    document.getElementById('lastNames').value = last;
                    document.getElementById('birthDate').value = m.birth;
                    document.getElementById('isAlive').checked = m.isAlive;
                    
                    if(!m.isAlive) {
                        document.getElementById('deathGroup').classList.remove('hidden');
                        document.getElementById('deathDate').value = m.death;
                    } else {
                        document.getElementById('deathGroup').classList.add('hidden');
                    }

                    document.getElementById('formTitle').textContent = "✏️ Editando Familiar";
                    document.getElementById('formTitle').style.color = "var(--edit-color)";
                    document.getElementById('btnSubmit').textContent = "Actualizar Datos";
                    document.getElementById('btnSubmit').style.backgroundColor = "var(--edit-color)";
                    document.getElementById('btnCancel').classList.remove('hidden');
                    break;
                }
            }
        });

        function formatDateString(dateStr) {
            if (!dateStr) return "????";
            const parts = dateStr.split("-");
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        // DIBUJAR AVATAR VECTORIAL (Evita fallos de CORS de urls externas)
        function drawVectorAvatar(x, y, r) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.clip();

            // Fondo del círculo
            ctx.fillStyle = "#e2e8f0";
            ctx.fillRect(x - r, y - r, r * 2, r * 2);

            // Cabeza del ícono
            ctx.beginPath();
            ctx.fillStyle = "#aaf1f5f9" === "#f1f5f9" ? "#94a3b8" : "#cbd5e1";
            ctx.fillStyle = "#94a3b8";
            ctx.arc(x, y - 2, r * 0.45, 0, Math.PI * 2);
            ctx.fill();

            // Cuerpo del ícono
            ctx.beginPath();
            ctx.arc(x, y + r + 2, r * 0.8, 0, Math.PI, true);
            ctx.fill();
            ctx.restore();
        }

        // MOTOR DE RENDERIZADO
        function drawTree() {
            ctx.clearRect(0, 0, virtualWidth, virtualHeight);
            if (familyData.length === 0) return;

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            // 1. LÍNEAS
            familyData.forEach(m => {
                if (m.spouseId) {
                    const spouse = familyData.find(s => s.id === m.spouseId);
                    if (spouse && m.id < spouse.id) {
                        ctx.beginPath();
                        ctx.strokeStyle = currentTheme === themes.minimalista ? "#cbd5e1" : (currentTheme === themes.elegante ? "#a39070" : "#e02424"); 
                        ctx.lineWidth = currentTheme.lineWidth + 0.5;
                        ctx.setLineDash(currentTheme === themes.minimalista ? [] : [3, 3]);
                        ctx.moveTo(m.x + cardW, m.y + cardH / 2);
                        ctx.lineTo(spouse.x, spouse.y + cardH / 2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }

                if (m.parents && m.parents.length > 0) {
                    ctx.beginPath();
                    ctx.strokeStyle = currentTheme.lineColor;
                    ctx.lineWidth = currentTheme.lineWidth;
                    ctx.setLineDash(currentTheme.lineDash);

                    if (m.parents.length >= 2) {
                        const p1 = familyData.find(p => p.id === m.parents[0]);
                        const p2 = familyData.find(p => p.id === m.parents[1]);
                        if (p1 && p2) {
                            let midX = (p1.x + p2.x + cardW) / 2;
                            let midY = (p1.y + p2.y + cardH) / 2;
                            ctx.moveTo(midX, midY);
                            ctx.lineTo(midX, m.y - 15);
                            ctx.lineTo(m.x + cardW / 2, m.y - 15);
                            ctx.lineTo(m.x + cardW / 2, m.y);
                        }
                    } else {
                        const parent = familyData.find(p => p.id === m.parents[0]);
                        if (parent) {
                            ctx.moveTo(parent.x + cardW / 2, parent.y + cardH);
                            ctx.lineTo(parent.x + cardW / 2, m.y - 15);
                            ctx.lineTo(m.x + cardW / 2, m.y - 15);
                            ctx.lineTo(m.x + cardW / 2, m.y);
                        }
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });

            // 2. TARJETAS
            familyData.forEach(m => {
                ctx.fillStyle = currentTheme.cardBg;
                ctx.shadowColor = currentTheme.shadowColor;
                ctx.shadowBlur = currentTheme.shadowBlur;
                ctx.shadowOffsetY = currentTheme.shadowBlur > 0 ? 3 : 0;
                ctx.strokeStyle = m.isAlive ? currentTheme.cardBorderAlive : currentTheme.cardBorderDead;
                ctx.lineWidth = currentTheme === themes.minimalista ? 0.1 : 1.8;
                
                ctx.beginPath();
                ctx.roundRect(m.x, m.y, cardW, cardH, currentTheme.cardRadius);
                ctx.fill();
                if(currentTheme !== themes.minimalista || !m.isAlive) {
                    ctx.stroke();
                }
                
                ctx.shadowBlur = 0; 
                ctx.shadowOffsetY = 0;

                // Render de Avatar Seguro (Subido o Vectorial)
                let radius = 18; 
                let avatarX = m.x + 12 + radius;
                let avatarY = m.y + (cardH / 2);

                if (m.imgObj) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(avatarX, avatarY, radius, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(m.imgObj, m.x + 12, m.y + (cardH / 2) - radius, radius * 2, radius * 2);
                    ctx.restore();
                } else {
                    drawVectorAvatar(avatarX, avatarY, radius);
                }

                const birthFormatted = formatDateString(m.birth);
                const deathFormatted = formatDateString(m.death);

                ctx.fillStyle = currentTheme.textColorName;
                ctx.font = currentTheme.fontName;
                ctx.fillText(m.name, m.x + 54, m.y + 28, cardW - 65);

                ctx.fillStyle = currentTheme.textColorDate;
                ctx.font = currentTheme.fontDate;
                const dateText = m.isAlive ? `Nac: ${birthFormatted}` : `${birthFormatted} - ${deathFormatted}`;
                ctx.fillText(dateText, m.x + 54, m.y + 45);

                if (currentTheme !== themes.minimalista && currentTheme !== themes.elegante) {
                    ctx.beginPath();
                    ctx.fillStyle = m.isAlive ? "#27ae60" : "#7f8c8d";
                    ctx.arc(m.x + cardW - 10, m.y + 10, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // --- MANEJADOR Y MOTOR DE EXPORTACIÓN ---
        function handleExport(selectElement) {
            const format = selectElement.value;
            if (!format) return;

            if (familyData.length === 0) {
                alert("Por favor, registra al menos un familiar antes de exportar.");
                selectElement.value = ""; // Reset del dropdown
                return;
            }

            // 1. Encontrar dimensiones del árbol real (Bounding Box)
            let minX = virtualWidth, maxX = 0, minY = virtualHeight, maxY = 0;
            familyData.forEach(m => {
                if (m.x < minX) minX = m.x;
                if (m.x + cardW > maxX) maxX = m.x + cardW;
                if (m.y < minY) minY = m.y;
                if (m.y + cardH > maxY) maxY = m.y + cardH;
            });

            const padding = 40;
            minX = Math.max(0, minX - padding);
            minY = Math.max(0, minY - padding);
            maxX = Math.min(virtualWidth, maxX + padding);
            maxY = Math.min(virtualHeight, maxY + padding);

            const cropWidth = maxX - minX;
            const cropHeight = maxY - minY;

            // 2. Crear un canvas aislado y limpio de clonación temporal
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = cropWidth * ratio;
            exportCanvas.height = cropHeight * ratio;
            const exportCtx = exportCanvas.getContext('2d');

            exportCtx.drawImage(
                canvas, 
                minX * ratio, minY * ratio, cropWidth * ratio, cropHeight * ratio, 
                0, 0, cropWidth * ratio, cropHeight * ratio
            );

            // 3. Ejecutar descarga según formato
            try {
                if (format === 'png') {
                    const link = document.createElement('a');
                    link.download = 'arbol_genealogico.png';
                    link.href = exportCanvas.toDataURL('image/png');
                    link.click();
                } 
                else if (format === 'jpg') {
                    const jpgCanvas = document.createElement('canvas');
                    jpgCanvas.width = exportCanvas.width;
                    jpgCanvas.height = exportCanvas.height;
                    const jpgCtx = jpgCanvas.getContext('2d');
                    
                    jpgCtx.fillStyle = currentTheme.bgCanvas;
                    jpgCtx.fillRect(0, 0, jpgCanvas.width, jpgCanvas.height);
                    jpgCtx.drawImage(exportCanvas, 0, 0);

                    const link = document.createElement('a');
                    link.download = 'arbol_genealogico.jpg';
                    link.href = jpgCanvas.toDataURL('image/jpeg', 0.95);
                    link.click();
                } 
                else if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const orientation = cropWidth > cropHeight ? 'l' : 'p';
                    const pdf = new jsPDF({
                        orientation: orientation,
                        unit: 'px',
                        format: [cropWidth, cropHeight]
                    });

                    const imgData = exportCanvas.toDataURL('image/jpeg', 1.0);
                    pdf.addImage(imgData, 'JPEG', 0, 0, cropWidth, cropHeight);
                    pdf.save('arbol_genealogico.pdf');
                }
            } catch (error) {
                console.error(error);
                alert("Hubo un conflicto con la imagen subida. Prueba exportando el árbol usando avatares vectoriales por defecto.");
            }

            // Limpiar el selector para permitir repetir la acción inmediatamente
            selectElement.value = "";
        }

        canvas.style.backgroundColor = currentTheme.bgCanvas;
    </script>
</body>
</html>
