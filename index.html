<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol Genealógico Inteligente Interconectado</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --spouse-color: #e02424;
            --line-color: #94a3b8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --action-color: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--primary-color);
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            height: 95vh;
        }

        .form-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow-y: auto;
        }

        .form-section h2 {
            margin-top: 0;
            font-size: 1.3rem;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 8px;
        }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input { width: auto; }
        .hidden { display: none; }

        button { width: 100%; padding: 10px; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit { background-color: var(--secondary-color); }
        .btn-submit:hover { background-color: #2980b9; }
        .btn-cancel { background-color: #94a3b8; margin-top: 8px; }

        .canvas-section {
            position: relative;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: auto;
        }

        #treeCanvas {
            background-color: #fafafa;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="form-section">
            <div id="crudBlock">
                <h2>1. Registrar Familiar</h2>
                <form id="treeForm">
                    <input type="hidden" id="editingMemberId" value="">
                    <div class="form-group">
                        <label for="names">Nombres:</label>
                        <input type="text" id="names" required placeholder="Ej. Carlos">
                    </div>
                    <div class="form-group">
                        <label for="lastNames">Apellidos:</label>
                        <input type="text" id="lastNames" required placeholder="Ej. Polo">
                    </div>
                    <div class="form-group">
                        <label for="birthYear">Año de Nacimiento:</label>
                        <input type="number" id="birthYear" min="1700" max="2026" required placeholder="Ej. 1989">
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="isAlive" checked onchange="toggleDeathField()">
                        <label for="isAlive">¿Está con vida?</label>
                    </div>
                    <div class="form-group hidden" id="deathGroup">
                        <label for="deathYear">Año de Fallecimiento:</label>
                        <input type="number" id="deathYear" min="1700" max="2026">
                    </div>
                    <div class="form-group">
                        <label for="photo">Foto del Familiar:</label>
                        <input type="file" id="photo" accept="image/*">
                    </div>
                    <button type="submit" class="btn-submit" id="btnSubmit">Guardar Persona</button>
                </form>
            </div>

            <div id="linkBlock" style="margin-top: 20px; padding-top: 15px; border-top: 2px solid var(--action-color);">
                <h2 style="color: var(--action-color);">2. Conectar Parentescos</h2>
                <div class="form-group">
                    <label for="sourceSelect" style="color: var(--action-color);">Persona A:</label>
                    <select id="sourceSelect" onchange="updateLinkSelectors()"></select>
                </div>
                <div class="form-group">
                    <label for="advancedRelationshipType">Relación:</label>
                    <select id="advancedRelationshipType">
                        <option value="es_esposo">Es ESPOSO/A de (Al lado)</option>
                        <option value="es_hijo">Es PADRE/MADRE de (El destino va ABAJO)</option>
                        <option value="es_padre">Es HIJO/A de (El destino va ARRIBA)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="targetSelect">Persona B:</label>
                    <select id="targetSelect"></select>
                </div>
                <button type="button" onclick="executeAdvancedLink()" style="background-color: var(--action-color);">Establecer Vínculo</button>
            </div>
        </section>

        <section class="canvas-section" id="canvasContainer">
            <canvas id="treeCanvas" width="2500" height="2500"></canvas>
        </section>
    </div>

    <script>
        let familyData = [];
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        
        const defaultImg = new Image();
        defaultImg.src = 'https://cdn-icons-png.flaticon.com/512/847/847969.png';

        function toggleDeathField() {
            const isAlive = document.getElementById('isAlive').checked;
            document.getElementById('deathGroup').classList.toggle('hidden', isAlive);
        }

        function updateLinkSelectors() {
            const sourceSelect = document.getElementById('sourceSelect');
            const targetSelect = document.getElementById('targetSelect');
            const activeId = sourceSelect.value;

            targetSelect.innerHTML = '';
            familyData.forEach(m => {
                if (m.id === activeId) return;
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.name;
                targetSelect.appendChild(opt);
            });
        }

        function refreshSelectors() {
            const sourceSelect = document.getElementById('sourceSelect');
            sourceSelect.innerHTML = '';
            familyData.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.name;
                sourceSelect.appendChild(opt);
            });
            updateLinkSelectors();
        }

        function executeAdvancedLink() {
            const sourceId = document.getElementById('sourceSelect').value;
            const targetId = document.getElementById('targetSelect').value;
            const role = document.getElementById('advancedRelationshipType').value;

            if (!sourceId || !targetId) return;

            const source = familyData.find(m => m.id === sourceId);
            const target = familyData.find(m => m.id === targetId);

            if (role === 'es_esposo') {
                source.spouseId = targetId;
                target.spouseId = sourceId;
            } else if (role === 'es_hijo') {
                if (!target.parents.includes(sourceId)) target.parents.push(sourceId);
            } else if (role === 'es_padre') {
                if (!source.parents.includes(targetId)) source.parents.push(targetId);
            }

            calculatePositions();
            drawTree();
        }

        document.getElementById('treeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const names = document.getElementById('names').value;
            const lastNames = document.getElementById('lastNames').value;
            const birthYear = document.getElementById('birthYear').value;
            const isAlive = document.getElementById('isAlive').checked;
            const deathYear = document.getElementById('deathYear').value;
            const photoInput = document.getElementById('photo');

            const newMember = {
                id: 'mem_' + Date.now(),
                name: `${names} ${lastNames}`,
                birth: birthYear,
                isAlive: isAlive,
                death: isAlive ? null : deathYear,
                parents: [],
                spouseId: null,
                x: 600, // Coordenadas base centrales por defecto
                y: 350,
                level: 1,
                imgObj: defaultImg 
            };

            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const customImg = new Image();
                    customImg.src = event.target.result;
                    customImg.onload = function() {
                        newMember.imgObj = customImg;
                        familyData.push(newMember);
                        finalizeRender();
                    };
                };
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                familyData.push(newMember);
                finalizeRender();
            }
        });

        function finalizeRender() {
            document.getElementById('treeForm').reset();
            toggleDeathField();
            refreshSelectors();
            calculatePositions();
            drawTree();
        }

        // REINGENIERÍA DEL ALGORITMO: ASIGNACIÓN DE COORDENADAS POR ANCLAS
        function calculatePositions() {
            if (familyData.length === 0) return;

            const cardW = 220;
            const cardH = 90;
            const levelH = 180;
            const horizontalGap = 60;

            // Paso 1: Encontrar el primer miembro registrado (ancla central)
            const root = familyData[0];
            root.x = 600;
            root.y = 350;
            root.level = 1;

            // Paso 2: Posicionar de forma iterativa y limpia basándose en vínculos directos sin recursión infinita
            for (let i = 0; i < 5; i++) { // Ciclo de refinamiento controlado
                familyData.forEach(m => {
                    // Si tiene cónyuge, anclarlo inmediatamente a la derecha
                    if (m.spouseId) {
                        const spouse = familyData.find(s => s.id === m.spouseId);
                        if (spouse) {
                            if (m === root || m.x !== 600) {
                                spouse.x = m.x + cardW + horizontalGap;
                                spouse.y = m.y;
                                spouse.level = m.level;
                            }
                        }
                    }

                    // Si tiene hijos registrados, posicionarlos abajo en el eje vertical
                    familyData.forEach(child => {
                        if (child.parents.includes(m.id)) {
                            child.level = m.level + 1;
                            child.y = root.y + ((child.level - root.level) * levelH);
                            
                            // Si el hijo tiene dos padres, centrarlo simétricamente en el medio de ambos
                            if (child.parents.length >= 2) {
                                const p1 = familyData.find(p => p.id === child.parents[0]);
                                const p2 = familyData.find(p => p.id === child.parents[1]);
                                if (p1 && p2) {
                                    child.x = (p1.x + p2.x) / 2;
                                }
                            } else {
                                child.x = m.x; // Si es soltero, baja recto
                            }
                        }
                    });

                    // Si este miembro tiene padres arriba, mover los padres al nivel superior (0)
                    m.parents.forEach(pId => {
                        const parent = familyData.find(p => p.id === pId);
                        if (parent) {
                            parent.level = m.level - 1;
                            parent.y = root.y - ((root.level - parent.level) * levelH);
                            
                            // Evitar colisión de los padres arriba
                            if (!parent.spouseId) {
                                parent.x = m.x - 100;
                            }
                        }
                    });
                });
            }
        }

        // MOTOR DE DIBUJO CON TRAZOS ORTOGONALES DE PRECISIÓN
        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (familyData.length === 0) return;

            const cardW = 220;
            const cardH = 90;

            // DIBUJAR LÍNEAS DE UNIÓN
            familyData.forEach(m => {
                // Línea de Cónyuges
                if (m.spouseId) {
                    const spouse = familyData.find(s => s.id === m.spouseId);
                    if (spouse && m.id < spouse.id) {
                        ctx.beginPath();
                        ctx.strokeStyle = "#e02424";
                        ctx.lineWidth = 3;
                        ctx.setLineDash([4, 4]);
                        ctx.moveTo(m.x + cardW, m.y + cardH / 2);
                        ctx.lineTo(spouse.x, spouse.y + cardH / 2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }

                // Línea de Hijos en Escuadra (Ortogonal) perfecta
                if (m.parents && m.parents.length > 0) {
                    // Si tiene ambos padres, creamos el punto de unión central en la línea de esposos
                    if (m.parents.length >= 2) {
                        const p1 = familyData.find(p => p.id === m.parents[0]);
                        const p2 = familyData.find(p => p.id === m.parents[1]);
                        if (p1 && p2) {
                            let midX = (p1.x + cardW + p2.x) / 2;
                            let midY = p1.y + cardH / 2;

                            ctx.beginPath();
                            ctx.strokeStyle = "#94a3b8";
                            ctx.lineWidth = 2.5;
                            // Baja desde la unión de los padres hasta el hijo en un trazo limpio
                            ctx.moveTo(midX, midY);
                            ctx.lineTo(midX, m.y - 25);
                            ctx.lineTo(m.x + cardW / 2, m.y - 25);
                            ctx.lineTo(m.x + cardW / 2, m.y);
                            ctx.stroke();
                        }
                    } else {
                        // Un solo padre
                        const parent = familyData.find(p => p.id === m.parents[0]);
                        if (parent) {
                            ctx.beginPath();
                            ctx.strokeStyle = "#94a3b8";
                            ctx.lineWidth = 2.5;
                            ctx.moveTo(parent.x + cardW / 2, parent.y + cardH);
                            ctx.lineTo(parent.x + cardW / 2, m.y - 25);
                            ctx.lineTo(m.x + cardW / 2, m.y - 25);
                            ctx.lineTo(m.x + cardW / 2, m.y);
                            ctx.stroke();
                        }
                    }
                }
            });

            // RENDERIZAR TARJETAS
            familyData.forEach(m => {
                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = "rgba(0, 0, 0, 0.08)";
                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 3;
                ctx.strokeStyle = m.isAlive ? "#3498db" : "#94a3b8";
                ctx.lineWidth = 2;
                
                ctx.beginPath();
                ctx.roundRect(m.x, m.y, cardW, cardH, 10);
                ctx.fill();
                ctx.stroke();
                
                ctx.shadowBlur = 0; 
                ctx.shadowOffsetY = 0;

                // Avatar circular
                ctx.save();
                ctx.beginPath();
                let radius = 25;
                let avatarX = m.x + 15 + radius;
                let avatarY = m.y + (cardH / 2);
                ctx.arc(avatarX, avatarY, radius, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(m.imgObj, m.x + 15, m.y + (cardH / 2) - radius, radius * 2, radius * 2);
                ctx.restore();

                // Textos internos
                ctx.fillStyle = "#2c3e50";
                ctx.font = "bold 13px sans-serif";
                ctx.fillText(m.name, m.x + 80, m.y + 38, cardW - 90);

                ctx.fillStyle = "#64748b";
                ctx.font = "11px sans-serif";
                const dateText = m.isAlive ? `Nac: ${m.birth}` : `${m.birth} - ${m.death}`;
                ctx.fillText(dateText, m.x + 80, m.y + 58);

                // Punto indicador de estado de vida
                ctx.beginPath();
                ctx.fillStyle = m.isAlive ? "#27ae60" : "#7f8c8d";
                ctx.arc(m.x + cardW - 15, m.y + 15, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }
    </script>
</body>
</html>
