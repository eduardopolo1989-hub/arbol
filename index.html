<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol Genealógico Inteligente</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --spouse-color: #e02424;
            --line-color: #94a3b8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--primary-color);
        }

        .container {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Formulario lateral fijo */
        .form-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .form-section h2 {
            margin-top: 0;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fff;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input { width: auto; }
        .hidden { display: none; }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #2980b9; }

        /* Lienzo del Árbol */
        .tree-viewport {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow-x: auto;
            min-height: 80vh;
            display: flex;
            justify-content: center;
        }

        /* --- Estructura del Árbol Genealógico --- */
        .tree, .tree ul, .tree li {
            list-style-type: none;
            margin: 0;
            padding: 0;
            position: relative;
        }

        .tree {
            display: flex;
            justify-content: center;
        }

        .tree ul {
            display: flex;
            justify-content: center;
            position: relative;
            padding-top: 20px;
        }

        .tree li {
            text-align: center;
            position: relative;
            padding: 20px 10px 0 10px;
        }

        /* Líneas horizontales */
        .tree li::before, .tree li::after {
            content: '';
            position: absolute;
            top: 0;
            right: 50%;
            border-top: 2px solid var(--line-color);
            width: 50%;
            height: 20px;
        }
        .tree li::after {
            right: auto;
            left: 50%;
            border-left: 2px solid var(--line-color);
        }

        .tree li:only-child::after, .tree li:only-child::before {
            display: none;
        }
        .tree li:only-child {
            padding-top: 0;
        }

        .tree li:first-child::before, .tree li:last-child::after {
            border: 0 none;
        }
        .tree li:last-child::before {
            border-right: 2px solid var(--line-color);
            border-radius: 0 5px 0 0;
        }
        .tree li:first-child::after {
            border-radius: 5px 0 0 0;
        }

        .tree ul::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            border-left: 2px solid var(--line-color);
            width: 0;
            height: 20px;
        }

        /* Contenedor de bloque para parejas */
        .node-group {
            display: inline-flex;
            align-items: flex-start;
            gap: 10px;
            position: relative;
        }

        /* --- Estilo de las Tarjetas --- */
        .member-card {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            width: 150px;
            padding: 10px;
            display: inline-block;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            z-index: 10;
            transition: all 0.2s;
        }

        .member-card:hover {
            border-color: var(--secondary-color);
            transform: scale(1.03);
        }

        .member-photo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 6px;
            display: block;
            border: 2px solid var(--secondary-color);
            background: #f8fafc;
        }

        .member-name {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-dates {
            font-size: 0.7rem;
            color: #64748b;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
        .dot-alive { background-color: #22c55e; }
        .dot-deceased { background-color: #ef4444; }

        /* Línea roja horizontal de unión matrimonial */
        .spouse-connection {
            position: absolute;
            top: 40px;
            left: 145px;
            width: 20px;
            border-top: 2px dashed var(--spouse-color);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="form-section">
            <h2>Registrar Familiar</h2>
            <form id="treeForm">
                <div class="form-group">
                    <label for="names">Nombres:</label>
                    <input type="text" id="names" required placeholder="Ej. Carlos Eduardo">
                </div>

                <div class="form-group">
                    <label for="lastNames">Apellidos:</label>
                    <input type="text" id="lastNames" required placeholder="Ej. Polo Velasco">
                </div>

                <div class="form-group">
                    <label for="birthYear">Año de Nacimiento:</label>
                    <input type="number" id="birthYear" min="1700" max="2026" required placeholder="Ej. 1989">
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="isAlive" checked onchange="toggleDeathField()">
                    <label for="isAlive">¿Está con vida?</label>
                </div>

                <div class="form-group hidden" id="deathGroup">
                    <label for="deathYear">Año de Fallecimiento:</label>
                    <input type="number" id="deathYear" min="1700" max="2026" placeholder="Ej. 2024">
                </div>

                <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 15px 0;">

                <div class="form-group">
                    <label for="relativeSelect">¿Tiene relación con algún miembro ya creado?</label>
                    <select id="relativeSelect" onchange="toggleRelationshipType()">
                        <option value="none">No, es el miembro inicial del árbol</option>
                    </select>
                </div>

                <div class="form-group hidden" id="relationshipGroup">
                    <label for="relationshipType">¿Qué es de esa persona?</label>
                    <select id="relationshipType">
                        <option value="hijo">Es su Hijo / Hija</option>
                        <option value="hermano">Es su Hermano / Hermana</option>
                        <option value="esposo">Es su Esposo / Esposa</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="photo">Foto:</label>
                    <input type="file" id="photo" accept="image/*">
                </div>

                <button type="submit">Vincular al Árbol</button>
            </form>
        </section>

        <main class="tree-viewport">
            <div class="tree" id="treeContainer">
                <p id="emptyMessage" style="color: #64748b; padding-top: 40px;">No has agregado ningún miembro aún. Comienza creando al primer miembro de la familia.</p>
            </div>
        </main>
    </div>

    <script>
        let familyData = [];

        function toggleDeathField() {
            const isAlive = document.getElementById('isAlive').checked;
            const deathGroup = document.getElementById('deathGroup');
            deathGroup.classList.toggle('hidden', isAlive);
        }

        function toggleRelationshipType() {
            const relativeSelect = document.getElementById('relativeSelect').value;
            const relationshipGroup = document.getElementById('relationshipGroup');
            relationshipGroup.classList.toggle('hidden', relativeSelect === 'none');
        }

        document.getElementById('treeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const names = document.getElementById('names').value;
            const lastNames = document.getElementById('lastNames').value;
            const birthYear = document.getElementById('birthYear').value;
            const isAlive = document.getElementById('isAlive').checked;
            const deathYear = document.getElementById('deathYear').value;
            const relativeId = document.getElementById('relativeSelect').value;
            const relationshipType = document.getElementById('relationshipType').value;
            const photoInput = document.getElementById('photo');

            const memberId = 'mem_' + Date.now();
            let parentId = null;
            let spouseId = null;

            // --- Motor de cálculo de relaciones ---
            if (relativeId !== 'none') {
                const relative = familyData.find(m => m.id === relativeId);
                
                if (relationshipType === 'hijo') {
                    parentId = relative.id;
                } else if (relationshipType === 'hermano') {
                    parentId = relative.parentId; // Comparte el mismo padre
                } else if (relationshipType === 'esposo') {
                    spouseId = relative.id;
                    parentId = relative.parentId; // Se renderiza en el mismo nivel/entorno
                }
            }

            const newMember = {
                id: memberId,
                name: `${names} ${lastNames}`,
                birth: birthYear,
                isAlive: isAlive,
                death: isAlive ? null : deathYear,
                parentId: parentId,
                spouseId: spouseId,
                photo: 'https://cdn-icons-png.flaticon.com/512/847/847969.png'
            };

            // Vincular de forma bidireccional si es esposo/a
            if (spouseId) {
                const spouse = familyData.find(m => m.id === spouseId);
                if (spouse) spouse.spouseId = memberId;
            }

            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    newMember.photo = event.target.result;
                    saveAndRender(newMember);
                };
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                saveAndRender(newMember);
            }
        });

        function saveAndRender(member) {
            familyData.push(member);
            
            // Actualizar el selector de familiares
            const relativeSelect = document.getElementById('relativeSelect');
            const option = document.createElement('option');
            option.value = member.id;
            option.textContent = member.name;
            relativeSelect.appendChild(option);

            renderTreeGraph();

            document.getElementById('treeForm').reset();
            toggleDeathField();
            toggleRelationshipType();
        }

        // Generar tarjeta HTML individual
        function getCardHTML(member) {
            const dateText = member.isAlive ? `b. ${member.birth}` : `${member.birth} - ${member.death}`;
            const dotClass = member.isAlive ? 'dot-alive' : 'dot-deceased';
            return `
                <div class="member-card" id="card_${member.id}">
                    <img src="${member.photo}" class="member-photo">
                    <div class="member-name" title="${member.name}">${member.name}</div>
                    <div class="member-dates">
                        <span class="status-dot ${dotClass}"></span>${dateText}
                    </div>
                </div>
            `;
        }

        // Construir ramas recursivas
        function buildTreeHTML(parentId, renderedIds) {
            // Filtrar hijos ignorando si son cónyuges ya renderizados en el nodo superior
            const children = familyData.filter(m => m.parentId === parentId && !renderedIds.has(m.id) && !m.spouseId);
            
            // Buscar también si el cónyuge tiene hijos registrados bajo su ID
            const parentNode = familyData.find(m => m.id === parentId);
            if (parentNode && parentNode.spouseId) {
                const spouseChildren = familyData.filter(m => m.parentId === parentNode.spouseId && !renderedIds.has(m.id));
                children.push(...spouseChildren);
            }

            if (children.length === 0) return '';

            let html = '<ul>';
            children.forEach(child => {
                renderedIds.add(child.id);
                
                html += '<li><div class="node-group">';
                html += getCardHTML(child);

                // Si este hijo tiene esposo/a, los unimos de lado
                if (child.spouseId) {
                    const spouse = familyData.find(m => m.id === child.spouseId);
                    if (spouse && !renderedIds.has(spouse.id)) {
                        renderedIds.add(spouse.id);
                        html += `<div class="spouse-connection"></div>`;
                        html += getCardHTML(spouse);
                    }
                }
                
                html += '</div>';
                html += buildTreeHTML(child.id, renderedIds);
                html += '</li>';
            });
            html += '</ul>';
            return html;
        }

        function renderTreeGraph() {
            const container = document.getElementById('treeContainer');
            if (familyData.length === 0) {
                container.innerHTML = '<p id="emptyMessage">No has agregado ningún miembro aún.</p>';
                return;
            }

            let renderedIds = new Set();
            // Raíces primarias (Nodos sin padres)
            const rootNodes = familyData.filter(m => m.parentId === null && !m.spouseId);
            
            // Si por descarte el primer nodo se creó como pareja de alguien pero quedó huérfano de nodo superior
            if(rootNodes.length === 0 && familyData.length > 0) {
                rootNodes.push(familyData[0]);
            }

            let finalHTML = '';
            rootNodes.forEach(root => {
                if (renderedIds.has(root.id)) return;
                renderedIds.add(root.id);

                finalHTML += '<ul><li><div class="node-group">';
                finalHTML += getCardHTML(root);

                if (root.spouseId) {
                    const spouse = familyData.find(m => m.id === root.spouseId);
                    if (spouse) {
                        renderedIds.add(spouse.id);
                        finalHTML += `<div class="spouse-connection"></div>`;
                        finalHTML += getCardHTML(spouse);
                    }
                }

                finalHTML += '</div>';
                finalHTML += buildTreeHTML(root.id, renderedIds);
                finalHTML += '</li></ul>';
            });

            container.innerHTML = finalHTML;
        }
    </script>
</body>
</html>
